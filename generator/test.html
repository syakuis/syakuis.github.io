<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="ko" xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta content="no" http-equiv="imagetoolbar"/>
  <title>JAVA getter , setter 생성 툴</title>
  <script type="text/javascript">
  //<![CDATA[

  /**
   * @file create
   * @brief JAVA getter , setter 생성
   * 
   * programmed by Seok Kyun. Choi. (최석균)
   * http://syaku.tistory.com
   */

  function init() {
    var t = document.getElementById("t").value;
    var mod = document.getElementById("lu").value;
    var val = document.getElementById("field").value;
    var show = document.getElementById("show");
    var show2 = document.getElementById("show2");
    show.value = "";
    show2.value = "";

    val = val.replace(/\s+/g,"");

    switch (mod) {
      case "L" : val = val.toLowerCase(); break;
      case "U" : val = val.toUpperCase(); break;
    }

    var ar = val.split(",");
    var cnt = ar.length;
    
    var memo = "";
    var sho = "";
    var ext = "";
    var string = "";
    var empty = "";
    var hash = "";

    var insert = "";
    var insert2 = "";
    var update = "";
    var result = "";

    for (var i in ar) {
    var str = ar[i];
      if (str != "") {
        if (t == 'java') {
          memo += str + ",";
          sho += pri(str) + "\n";
          ext += get(str) + "\n";
          ext += set(str) + "\n";
          empty += toEmpty(str) + "\n";
          string += toString(str);
          insert += ibatis_insert(str) + "\n";
          insert2 += ibatis_insert2(str) + "\n";
          update += ibatis_update(str) + "\n";
          result += ibatis_result(str) + "\n";
        } else if (t == 'jsp-get') {
          sho += "String " + str + " = \"\";\n";
          ext += get2(str) + "\n";
          hash += "map.put(\"" + str + "\"," + str + ");\n";
        } else if (t == 'jsp-set') {
          sho += param(str) + "\n";
          ext += set2(str) + "\n";
        }
      }
    }

    if (t == 'java') {
      string = "\npublic String toString() {\n" + 
                    "StringBuilder sb = new StringBuilder();\n" + 
                    "sb" + string + ";\n" + 
                    "return sb.toString();\n" + 
                    "}\n";
      empty = "\npublic void empty() { this.empty(\"\"); }\n" + 
                    "public void empty(String str) {\n" + 
                     empty + "\n" + 
                    "}\n";
      show2.value = insert + "\n" + insert2 + "\n" + update + "\n" + result;
    }
    

    show.value = "public class mdModel {\n//" + memo.replace(/\,$/,"") + "\n" +  hash + "\n" + sho + "\n" + ext + empty + string + "\n};";
  }


  function param(val) {
    return "String " + val + " = param.value(\"" + val + "\");"; 
  }

  function pri(val) {
    return "private String " + val + ";"; 
  }

  function get(val) {
    var reg = /^(.)(.*)/;
    var fir,sec;
    if (reg.test(val)) {
      fir = RegExp.$1;
      sec = RegExp.$2;
    }
    return "public String get" + fir.toUpperCase() + sec + "() { return " + val + "; }";
  }

  function toEmpty(val) {
    return "this." + val + " = str;"
  }

  function toString(val) {
    var reg = /^(.)(.*)/;
    var fir,sec;
    if (reg.test(val)) {
      fir = RegExp.$1;
      sec = RegExp.$2;
    }

    return ".append(\"&" + val + "=\").append(" + val + ")";
  }

  function set(val) {
    var reg = /^(.)(.*)/;
    var fir,sec;
    if (reg.test(val)) {
      fir = RegExp.$1;
      sec = RegExp.$2;
    }
    return "public void set" + fir.toUpperCase() + sec + "(String " + val + ") { this." + val + " = " + val + "; }";
  }

  function get2(val) {
    var reg = /^(.)(.*)/;
    var fir,sec;
    if (reg.test(val)) {
      fir = RegExp.$1;
      sec = RegExp.$2;
    }
    return "String " + val + " = obj.get" + fir.toUpperCase() + sec + "();";
  }

  function set2(val) {
    var reg = /^(.)(.*)/;
    var fir,sec;
    if (reg.test(val)) {
      fir = RegExp.$1;
      sec = RegExp.$2;
    }
    return "md.set" + fir.toUpperCase() + sec + "(" + val + ");";
  }

  function ibatis_insert(val) {
    return val + ",";
  }
  function ibatis_insert2(val) {
    return "#" + val + "#,";
  }

  function ibatis_update(val) {
    return val + " = #" + val + "#,";
  }
  function ibatis_result(val) {
    return "<result property=\"" + val + "\" column=\"" + val + "\" nullValue=\"\" />";
  }

  //]]>
  </script>

</head>

<body>
  <h1>구분자는 , 로 사용합니다.</h1><br />
  <div>

  <select id="t">
    <option value="java">java</option>
    <option value="jsp-get">jsp-get</option>
    <option value="jsp-set">jsp-set</option>
  </select>

  <select id="lu">
    <option value="">유지</option>
    <option value="L">소문자</option>
    <option value="U">대문자</option>
  </select>
  <input type="text" id="field" style="width:100%;"/>
  <input type="button" onclick="init();" value="생성" />
  </div>
  <textarea id="show" rows="" cols="" style="width:100%;height:200px;"></textarea>
  <textarea id="show2" rows="" cols="" style="width:100%;height:200px;"></textarea>
  <textarea id="show3" rows="" cols="" style="width:100%;height:200px;"></textarea>
</body>
</html>
